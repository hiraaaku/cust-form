<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Ornamental frame -->
  <g fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top curves -->
    <path d="M 50 30 Q 60 20 100 20 Q 140 20 150 30"/>
    
    <!-- Top right ornament -->
    <path d="M 150 30 Q 160 35 165 45 Q 165 50 160 50"/>
    <path d="M 160 50 Q 170 55 170 65 Q 165 70 155 70"/>
    
    <!-- Right side -->
    <line x1="160" y1="65" x2="165" y2="100"/>
    <line x1="160" y1="70" x2="170" y2="100"/>
    
    <!-- Bottom right ornament -->
    <path d="M 155 130 Q 170 135 170 145"/>
    <path d="M 160 150 Q 165 160 160 170"/>
    
    <!-- Bottom curves -->
    <path d="M 150 170 Q 140 180 100 180 Q 60 180 50 170"/>
    
    <!-- Bottom left ornament -->
    <path d="M 50 170 Q 35 165 30 155"/>
    <path d="M 30 150 Q 35 140 40 130"/>
    
    <!-- Left side -->
    <line x1="40" y1="130" x2="30" y2="100"/>
    <line x1="35" y1="65" x2="30" y2="100"/>
    
    <!-- Top left ornament -->
    <path d="M 40 50 Q 35 40 45 30"/>
    <path d="M 50 30 Q 40 35 40 50"/>
  </g>
  
  <!-- Center M letter -->
  <text x="100" y="130" font-size="90" font-weight="bold" fill="#D4AF37" text-anchor="middle" font-family="Georgia, serif">M</text>
</svg>